<!DOCTYPE html>
<html>
<head>
    <title>5 Sound Buttons</title>
</head>
<body>

<h1>Sound Board</h1>

<button onclick="playTone(262)">Sound 1</button>
<button onclick="playTone(330)">Sound 2</button>
<button onclick="playTone(392)">Sound 3</button>
<button onclick="playTone(523)">Sound 4</button>
<button onclick="playTone(659)">Sound 5</button>

<script>
const audioContext = new (window.AudioContext || window.webkitAudioContext)();

function playTone(frequency) {
    const oscillator = audioContext.createOscillator();
    const gainNode = audioContext.createGain();

    oscillator.connect(gainNode);
    gainNode.connect(audioContext.destination);

    oscillator.frequency.value = frequency;
    oscillator.type = "sine";

    oscillator.start();

    gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(
        0.0001,
        audioContext.currentTime + 0.5
    );

    oscillator.stop(audioContext.currentTime + 0.5);
}
</script>

</body>
</html>
